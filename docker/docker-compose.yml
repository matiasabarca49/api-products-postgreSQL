services:
  # ==========================================
  # SESIONES (REDIS)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: monolito_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - network_backend

  # ==========================================
  # BASE DE DATOS PRINCIPAL (POSTGRES MASTER)
  # ==========================================
  postgres_master:
    image: public.ecr.aws/bitnami/postgresql:15
    container_name: postgres_master
    environment:
      - POSTGRESQL_USERNAME=${PG_USER}
      - POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - POSTGRESQL_DATABASE=${PG_DATABASE}
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=${DB_REPL_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_REPL_PASSWORD}
    volumes:
      - postgres_master_data:/bitnami/postgresql
      - ./init-scripts:/docker-entrypoint-initdb.d:ro # Monta scripts de inicialización en modo lectura (ro)
    networks:
      - network_backend

  # ==========================================
  # RÉPLICAS DE LECTURA (POSTGRES SLAVES)
  # ==========================================
  postgres_slave_1:
    image: public.ecr.aws/bitnami/postgresql:15
    container_name: postgres_slave_1
    depends_on:
      - postgres_master
    environment:
      - POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - POSTGRESQL_MASTER_HOST=postgres_master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${DB_REPL_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_REPL_PASSWORD}
    networks:
      - network_backend

  postgres_slave_2:
    image: public.ecr.aws/bitnami/postgresql:15
    container_name: postgres_slave_2
    depends_on:
      - postgres_master
    environment:
      - POSTGRESQL_PASSWORD=${PG_PASSWORD}
      - POSTGRESQL_MASTER_HOST=postgres_master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=${DB_REPL_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${DB_REPL_PASSWORD}
    networks:
      - network_backend

  # ==========================================
  # MONOLITO NODE (CONTENEDOR 1)
  # ==========================================
  app_node_1:
    container_name: monolito_app_1
    build:
      context: ..              # Sube un nivel a la raíz para encontrar el código
      dockerfile: docker/Dockerfile  # Ruta al Dockerfile desde la raíz
    restart: always
    env_file:
      - .env.production        # Carga las variables automáticamente en el contenedor
    environment:
      - PORT=8080
      - REDIS_HOST=monolito_redis
      - PG_HOST=postgres_master # Tu app escribirá aquí por defecto
    depends_on:
      - monolito_redis
      - postgres_master
    networks:
      - network_frontend       # Para hablar con Nginx
      - network_backend        # Para hablar con la DB y Redis

  # ==========================================
  # MONOLITO NODE.JS (CONTENEDOR 2)
  # ==========================================
  app_node_2:
    container_name: monolito_app_2
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    env_file:
      - .env.production
    environment:
      - PORT=8080
      - REDIS_HOST=monolito_redis
      - PG_HOST=postgres_master
    depends_on:
      - monolito_redis
      - postgres_master
    networks:
      - network_frontend
      - network_backend

# ==========================================
# BALANCEADOR DE CARGA (NGINX)
# ==========================================
  nginx_lb:
    image: nginx:1.25-alpine
    container_name: monolito_nginx
    restart: always
    ports:
      - "8080:8080" # Expone el puerto 8080 de tu máquina local al 8080 de Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # Monta tu archivo de configuración en modo lectura (ro)
    depends_on:
      - app_node_1
      - app_node_2
    networks:
      - network_frontend # Nginx SOLO vive en la red de frontend

# ==========================================
# CONFIGURACIÓN DE REDES Y VOLÚMENES
# ==========================================
networks:
  network_frontend:
    driver: bridge
  network_backend:
    driver: bridge

volumes:
  redis_data:
  postgres_master_data: