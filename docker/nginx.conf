# docker/nginx.conf

#grupo de servidores a los que se enviará el tráfico
upstream monolito_servers {
    server app_node_1:8080;
    server app_node_2:8080;
}

server {
    # Nginx escuchará en el puerto 8080 del contenedor
    listen 8080;
    server_name localhost;

    # Configuración para manejar logs (opcional pero recomendado)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    #Todo el tráfico que llegue a la raíz (/) se redirige al upstream
    location / {
        proxy_pass http://monolito_servers;
        
        # Cabeceras necesarias para que Node reconozca IPs reales y protocolos
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración para soportar WebSockets (útil si tu SSR usa Live Reload o socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
} 