paths:
  /api/carts:
    get:
      summary: "Obtener lista paginada de carritos con filtros"
      tags:
        - Carts
      responses:
        "200":
          description: "El carrito fue obtenido existosamente."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#components/schemas/Cart"

        "500":
          description: "Error en el proceso de generar la compra"
  /api/carts/{cid}:
    get:
      summary: "Obtener carrito por ID"
      tags:
        - Carts
      parameters:
      - name: cid
        in: path
        required: true
        description: "ID del carrito"
        schema: 
          $type: String
      responses:
        "200":
          description: "El carrito fue obtenido existosamente."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#components/schemas/Cart"

        "404":
          description: "Carrito no encontrado"
components:
  schemas:
    Cart:
      type: object
      properties:
        id: 
          type: number
          description: "ID MongoDB"
        date_cart: 
          type: Timestamp
          description: "Fecha en la que se créo el carrito"
        created_at: 
          type: Timestamp
          description: "Fecha en la que se creo el carrito"
      example:
        id: 1
        date_cart: "25/07/2022"
        created_at: "25/07/2022"
    Cart_product:
      type: object
      description: "Representa un producto comprado en un  carrito de un usuario ya pagado."
      properties:
        id: 
          type: number
          description: "ID del producto en el carrito"
        cart_id: 
          type: number
          description: "ID del usuario dueño del carrito"
        seller_product_id: 
          type: number
          description: "ID del producto del vendedor"
        quantity: 
          type: number
          description: "Cantidad del producto comprado"
        price: 
          type: number
          description: "Precio del producto comprado"
        created_at: 
          type: Timestamp
          description: "Fecha en la que se creo el carrito"
      example:
        id: 1
        cart_id: 1
        seller_product_id: 1
        quantity: 1
        price: 10.99
        created_at: "25/07/2022"
          
