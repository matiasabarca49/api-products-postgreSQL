paths:
  /api/sales:
    get:
      summary: "Obtener todas las ventas de un usuario"
      description: "Permite al usuario obtener una lista de todas las ventas realizadas."
      tags:
        - "Sales"
      responses:
        '200':
          description: "Lista de ventas obtenida existosamente."
  /api/sales/states:
    put:
      summary: "Actualizar el estado de una venta"
      description: "Permite al usuario actualizar el estado de una venta específica."
      tags:
        - "Sales"
      responses:
        '200':
          description: "Estado de la venta actualizado existosamente." 
components:
  schemas:
    Sale:
      type: object
      properties:
        id:
          type: integer
          description: "ID de la venta"
        seller_id:
          type: number
          description: "ID del vendedor"
        buyer_id:
          type: number
          description: "ID del comprador"
        product_id:
          type: number
          description: "ID del producto vendido"
        cart_id:
          type: number
          description: "ID del carrito asociado a la venta"
        ticket_id:
          type: number
          description: "ID del ticket asociado a la venta"
        quantity:
          type: number
          description: "Cantidad de productos vendidos"
        price:
          type: number
          description: "Precio total de la venta"
        total:
          type: number
          description: "Total de la venta"
        status:
          type: string
          description: "Estado de la venta (e.g., 'pending', 'completed', 'canceled')"
        delivery_type:
          type: string
          description: "Tipo de entrega (e.g., 'pickup', 'delivery')"
        created_at:
          type: timestamp
          description: "Fecha y hora de creación de la venta"
      example:
        id: 1
        seller_id: 123
        buyer_id: 456
        product_id: 789
        cart_id: 1011
        ticket_id: 1213
        quantity: 2
        price: 50.00
        total: 100.00
        status: "completed"
        delivery_type: "delivery"
        created_at: "2024-06-01T12:00:00Z"